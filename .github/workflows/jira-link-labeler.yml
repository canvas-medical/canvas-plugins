name: jira-link-labeler

on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  update-jira-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: check-and-label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const hasJira = body.includes('https://canvasmedical.atlassian.net');

            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const currentLabels = labels.data.map(l => l.name);

            if (hasJira) {
              if (!currentLabels.includes('Jira: Linked')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['Jira: Linked']
                });
              }

              if (currentLabels.includes('Jira: Not Linked')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'Jira: Not Linked'
                });
              }
            } else {
              if (!currentLabels.includes('Jira: Not Linked')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['Jira: Not Linked']
                });
              }

              if (currentLabels.includes('Jira: Linked')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'Jira: Linked'
                });
              }
            }
