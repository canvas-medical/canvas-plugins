syntax = 'proto3';

import "canvas_generated/messages/events.proto";
import "canvas_generated/messages/plugins.proto";

package canvas;

service PluginRunner {
  rpc HandleEvent (Event) returns (stream EventResponse);

  rpc ReloadPlugins (ReloadPluginsRequest) returns (stream ReloadPluginsResponse);

  rpc ReloadPlugin (ReloadPluginRequest) returns (stream ReloadPluginResponse);

  rpc UnloadPlugin (UnloadPluginRequest) returns (stream UnloadPluginResponse);

  // Agent Runner Framework (KOALA-5544). Reuses EventResponse so emitted
  // agent effects flow back through the same shape handler-emitted effects do.
  rpc RunAgent (RunAgentRequest) returns (stream EventResponse);
}
