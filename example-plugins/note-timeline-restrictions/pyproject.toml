[project]
authors = [
  {email = "engineering@canvasmedical.com", name = "Canvas Team"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Example plugin demonstrating note access restriction via NoteRestrictionsEffect. Implements concurrent edit locking to prevent simultaneous edits, role-based note type access control configurable from a dashboard, and real-time permission updates via GraphQL subscriptions."
license = "MIT"
name = "note-timeline-restrictions"
readme = "note_timeline_restrictions/README.md"
requires-python = ">=3.11"
version = "0.1.0"

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]

[tool.uv.sources]
canvas = {editable = true, path = "../../"}
