<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Staff Signature</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 1.5rem;
        color: #1f2937;
      }
      .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .name {
        font-size: 1rem;
        font-weight: 600;
      }
      .signature {
        max-width: 100%;
        max-height: 320px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 1rem;
        background: #ffffff;
      }
      .empty {
        color: #6b7280;
        font-style: italic;
        padding: 2rem 1rem;
        text-align: center;
        border: 1px dashed #d1d5db;
        border-radius: 6px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="name">{{ staff_name }}</div>
      {% if signature_url %}
        <img class="signature" src="{{ signature_url }}" alt="Signature for {{ staff_name }}" />
      {% else %}
        <div class="empty">No signature on file.</div>
      {% endif %}
    </div>
  </body>
</html>
