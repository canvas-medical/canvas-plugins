[project]
authors = [
  {email = "engineering@canvasmedical.com", name = "Canvas Team"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Note footer buttons that exercise every Note and Appointment state transition exposed by the SDK, logging success or validation error to the note via a custom command."
license = "MIT"
name = "note_state_transition_buttons"
readme = "note_state_transition_buttons/README.md"
requires-python = ">=3.11"
version = "1.0.0"

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]
