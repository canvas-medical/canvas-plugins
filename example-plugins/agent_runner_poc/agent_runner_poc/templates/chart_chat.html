<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Chart chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f8;
        --bubble-user: #2563eb;
        --bubble-user-fg: #ffffff;
        --bubble-assistant: #ffffff;
        --bubble-assistant-fg: #111827;
        --border: #e5e7eb;
        --muted: #6b7280;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: #111827;
        display: flex;
        flex-direction: column;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .bubble {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
      }
      .user {
        align-self: flex-end;
        background: var(--bubble-user);
        color: var(--bubble-user-fg);
        border-bottom-right-radius: 4px;
      }
      .assistant {
        align-self: flex-start;
        background: var(--bubble-assistant);
        color: var(--bubble-assistant-fg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
        align-self: flex-start;
        padding: 4px 8px;
      }
      #composer {
        display: flex;
        gap: 8px;
        padding: 12px;
        background: #ffffff;
        border-top: 1px solid var(--border);
      }
      #composer textarea {
        flex: 1;
        min-height: 44px;
        max-height: 160px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        resize: vertical;
        font: inherit;
      }
      #composer textarea:focus {
        outline: 2px solid var(--bubble-user);
        outline-offset: -1px;
        border-color: var(--bubble-user);
      }
      #composer button {
        padding: 0 16px;
        background: var(--bubble-user);
        color: var(--bubble-user-fg);
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      #composer button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .error {
        color: #b91c1c;
        background: #fef2f2;
        border-color: #fecaca;
      }
    </style>
  </head>
  <body>
    <div id="log" aria-live="polite"></div>
    <form id="composer" autocomplete="off">
      <textarea id="message" name="message" placeholder="Ask about this patient..." aria-label="Message" required></textarea>
      <button id="send" type="submit">Send</button>
    </form>
    <script>
      const PATIENT_ID = "{{ patient_id|escapejs }}";
      const log = document.getElementById('log');
      const composer = document.getElementById('composer');
      const messageEl = document.getElementById('message');
      const sendBtn = document.getElementById('send');

      function appendBubble(role, text, opts) {
        const div = document.createElement('div');
        div.className = 'bubble ' + role + (opts && opts.error ? ' error' : '');
        div.textContent = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        return div;
      }

      function appendMeta(text) {
        const div = document.createElement('div');
        div.className = 'meta';
        div.textContent = text;
        log.appendChild(div);
      }

      async function loadHistory() {
        try {
          const res = await fetch(`/plugin-io/api/agent_runner_poc/chart-chat-history?patient=${encodeURIComponent(PATIENT_ID)}`);
          if (!res.ok) throw new Error('history fetch failed: ' + res.status);
          const data = await res.json();
          (data.messages || []).forEach(m => appendBubble(m.role, m.text));
          if (!data.messages || !data.messages.length) {
            appendMeta('Start the conversation. The agent can read this patient’s conditions, recent labs, and medications.');
          }
        } catch (err) {
          appendBubble('assistant', 'Failed to load conversation history: ' + err.message, { error: true });
        }
      }

      async function sendMessage(text) {
        const pending = appendBubble('assistant', '…');
        sendBtn.disabled = true;
        try {
          const res = await fetch('/plugin-io/api/agent_runner_poc/chart-chat-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patient_id: PATIENT_ID, message: text }),
          });
          const data = await res.json();
          if (!res.ok) {
            pending.classList.add('error');
            pending.textContent = data.error || ('Request failed: ' + res.status);
            return;
          }
          pending.textContent = data.response || '(no response)';
        } catch (err) {
          pending.classList.add('error');
          pending.textContent = 'Request failed: ' + err.message;
        } finally {
          sendBtn.disabled = false;
          messageEl.focus();
        }
      }

      composer.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageEl.value.trim();
        if (!text) return;
        appendBubble('user', text);
        messageEl.value = '';
        sendMessage(text);
      });

      messageEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit();
        }
      });

      loadHistory();
    </script>
  </body>
</html>
