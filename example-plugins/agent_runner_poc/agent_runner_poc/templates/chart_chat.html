<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Chart chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f8;
        --bubble-user: #2563eb;
        --bubble-user-fg: #ffffff;
        --bubble-assistant: #ffffff;
        --bubble-assistant-fg: #111827;
        --border: #e5e7eb;
        --muted: #6b7280;
      }
      * { box-sizing: border-box; }
      html, body { height: 95%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: #111827;
        display: flex;
        flex-direction: column;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .bubble {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
      }
      .user {
        align-self: flex-end;
        background: var(--bubble-user);
        color: var(--bubble-user-fg);
        border-bottom-right-radius: 4px;
      }
      .assistant {
        align-self: flex-start;
        background: var(--bubble-assistant);
        color: var(--bubble-assistant-fg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
        align-self: flex-start;
        padding: 4px 8px;
      }
      #composer {
        display: flex;
        gap: 8px;
        padding: 12px;
        background: #ffffff;
        border-top: 1px solid var(--border);
      }
      #composer textarea {
        flex: 1;
        min-height: 44px;
        max-height: 160px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        resize: vertical;
        font: inherit;
      }
      #composer textarea:focus {
        outline: 2px solid var(--bubble-user);
        outline-offset: -1px;
        border-color: var(--bubble-user);
      }
      #composer button {
        padding: 0 16px;
        background: var(--bubble-user);
        color: var(--bubble-user-fg);
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      #composer button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .error {
        color: #b91c1c;
        background: #fef2f2;
        border-color: #fecaca;
      }
    </style>
  </head>
  <body>
    <div id="log" aria-live="polite"></div>
    <form id="composer" autocomplete="off">
      <textarea id="message" name="message" placeholder="Ask about this patient..." aria-label="Message" required></textarea>
      <button id="send" type="submit">Send</button>
    </form>
    <script>
      const PATIENT_ID = "{{ patient_id|escapejs }}";
      const HISTORY_URL = `/plugin-io/api/agent_runner_poc/chart-chat-history?patient=${encodeURIComponent(PATIENT_ID)}`;
      const MESSAGE_URL = '/plugin-io/api/agent_runner_poc/chart-chat-message';
      const POLL_INTERVAL_MS = 1500;
      const POLL_TIMEOUT_MS = 90000;

      const log = document.getElementById('log');
      const composer = document.getElementById('composer');
      const messageEl = document.getElementById('message');
      const sendBtn = document.getElementById('send');

      // Count of assistant turns already rendered. Polling uses this as the
      // baseline to detect when the agent's reply has landed in Conversation.
      let assistantCount = 0;

      function appendBubble(role, text, opts) {
        const div = document.createElement('div');
        div.className = 'bubble ' + role + (opts && opts.error ? ' error' : '');
        div.textContent = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        return div;
      }

      function appendMeta(text) {
        const div = document.createElement('div');
        div.className = 'meta';
        div.textContent = text;
        log.appendChild(div);
      }

      async function loadHistory() {
        try {
          const res = await fetch(HISTORY_URL, { cache: 'no-store' });
          if (!res.ok) throw new Error('history fetch failed: ' + res.status);
          const data = await res.json();
          const messages = data.messages || [];
          messages.forEach(m => appendBubble(m.role, m.text));
          assistantCount = messages.filter(m => m.role === 'assistant').length;
          if (!messages.length) {
            appendMeta('Start the conversation. The agent can read this patient’s conditions, recent labs, and medications.');
          }
        } catch (err) {
          appendBubble('assistant', 'Failed to load conversation history: ' + err.message, { error: true });
        }
      }

      async function pollForAssistantReply(baseline, placeholder) {
        // Poll /chart-chat-history at a fixed cadence until the assistant
        // count grows past the baseline (the agent's save_state wrote the
        // new turn) or we exceed the wall-clock budget.
        const deadline = Date.now() + POLL_TIMEOUT_MS;
        while (Date.now() < deadline) {
          await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
          try {
            const res = await fetch(HISTORY_URL, { cache: 'no-store' });
            if (!res.ok) continue;
            const data = await res.json();
            const messages = data.messages || [];
            const assistants = messages.filter(m => m.role === 'assistant');
            console.debug('chart-chat poll: messages=' + messages.length + ' assistants=' + assistants.length + ' baseline=' + baseline);
            if (assistants.length > baseline) {
              const reply = assistants[assistants.length - 1];
              placeholder.textContent = reply.text || '(no response)';
              assistantCount = assistants.length;
              return;
            }
          } catch (err) {
            // Transient network blip — keep polling until the deadline.
          }
        }
        placeholder.classList.add('error');
        placeholder.textContent = 'No response after ' + (POLL_TIMEOUT_MS / 1000) + 's; the agent may have crashed. Check the plugin-runner logs.';
      }

      async function sendMessage(text) {
        // Optimistic render: user bubble + "thinking…" placeholder go up
        // immediately so the UI feels responsive. The placeholder gets
        // replaced with the agent's reply once polling sees the new turn.
        appendBubble('user', text);
        const placeholder = appendBubble('assistant', '…');
        const baseline = assistantCount;
        sendBtn.disabled = true;
        try {
          const res = await fetch(MESSAGE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patient_id: PATIENT_ID, message: text }),
          });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            placeholder.classList.add('error');
            placeholder.textContent = data.error || ('Request failed: ' + res.status);
            return;
          }
          await pollForAssistantReply(baseline, placeholder);
        } catch (err) {
          placeholder.classList.add('error');
          placeholder.textContent = 'Request failed: ' + err.message;
        } finally {
          sendBtn.disabled = false;
          messageEl.focus();
        }
      }

      composer.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageEl.value.trim();
        if (!text) return;
        messageEl.value = '';
        sendMessage(text);
      });

      messageEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit();
        }
      });

      loadHistory();
    </script>
  </body>
</html>
